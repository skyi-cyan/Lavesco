name: lavesco
description: 라베스코 골프 스코어 공유 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.0.0
  firebase_analytics: ^11.0.0

  # 인증
  google_sign_in: ^6.0.0
  sign_in_with_apple: ^6.0.0

  # 상태 관리
  flutter_riverpod: ^2.5.0

  # 네비게이션
  go_router: ^14.0.0

  # 오프라인 지원
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 네트워크
  connectivity_plus: ^6.0.0

  # 유틸리티
  intl: ^0.19.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  flutter_local_notifications: ^17.0.0

  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0

  # 기타
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
